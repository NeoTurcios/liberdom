name: Build OpenFind Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'openfind-core/**'
      - '.github/workflows/android.yml'

jobs:
  build-rust:
    name: Build Rust native libraries
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

    - name: Cache Rust deps
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          openfind-core/target
        key: ${{ runner.os }}-rust-${{ hashFiles('openfind-core/Cargo.toml') }}
        restore-keys: |
          ${{ runner.os }}-rust-

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    - name: Setup Android SDK
      run: |
        ANDROID_SDK_ROOT=$ANDROID_HOME
        if [ ! -f "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
          echo "Installing cmdline-tools..."
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
          unzip -qo /tmp/cmdtools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest" 2>/dev/null || true
        fi
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973" 2>/dev/null || true
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

    - name: Build Rust for Android (all ABIs)
      run: |
        cd openfind-core
        for abi in arm64-v8a armeabi-v7a x86_64; do
          echo "Building for $abi..."
          cargo ndk -t "$abi" -o ../android/app/src/main/jniLibs build --release || echo "WARN: Failed for $abi, continuing..."
        done

    - name: Upload native libraries
      uses: actions/upload-artifact@v4
      with:
        name: native-libs
        path: android/app/src/main/jniLibs/
        if-no-files-found: ignore
        retention-days: 1

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-rust

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Download native libraries (if built)
      uses: actions/download-artifact@v4
      with:
        name: native-libs
        path: android/app/src/main/jniLibs/
      continue-on-error: true

    - name: Verify native libs
      run: find android/app/src/main/jniLibs -type f 2>/dev/null | sort || echo "No native libs — Kotlin fallback will be used"

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle deps
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant Gradle Wrapper Execute Permission
      run: chmod +x android/gradlew

    - name: Build Release APK
      run: cd android && ./gradlew assembleRelease --no-daemon

    - name: Build Debug APK
      run: cd android && ./gradlew assembleDebug --no-daemon

    - name: Stop Gradle Daemons
      if: always()
      run: cd android && ./gradlew --stop || true

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: OpenFind-Release-APK
        path: android/app/build/outputs/apk/release/app-release.apk
        if-no-files-found: warn

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: OpenFind-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
