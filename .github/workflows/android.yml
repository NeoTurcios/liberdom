name: Build OpenFind Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'openfind-core/**'
      - '.github/workflows/android.yml'

jobs:
  build:
    name: Build Android APK (Rust + Kotlin)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

    - name: Cache Rust deps
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          openfind-core/target
        key: ${{ runner.os }}-rust-${{ hashFiles('openfind-core/Cargo.toml') }}
        restore-keys: |
          ${{ runner.os }}-rust-

    - name: Install cargo-ndk
      run: cargo install cargo-ndk --version 3.5.7

    - name: Install Android NDK
      run: |
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973" 2>/dev/null || true
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

    - name: Build Rust core for Android (arm64-v8a)
      run: |
        cd openfind-core
        cargo ndk -t arm64-v8a -o ../android/app/src/main/jniLibs build --release

    - name: Build Rust core for Android (armeabi-v7a)
      run: |
        cd openfind-core
        cargo ndk -t armeabi-v7a -o ../android/app/src/main/jniLibs build --release

    - name: Build Rust core for Android (x86_64)
      run: |
        cd openfind-core
        cargo ndk -t x86_64 -o ../android/app/src/main/jniLibs build --release

    - name: Verify native libraries
      run: find android/app/src/main/jniLibs -type f -name "*.so" 2>/dev/null | sort

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Make Gradle Wrapper Executable
      run: chmod +x android/gradlew

    - name: Build Release APK
      run: |
        cd android
        ./gradlew assembleRelease --no-daemon

    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon

    - name: Stop Gradle Daemons
      if: always()
      run: cd android && ./gradlew --stop || true

    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenFind-Release-APK
        path: android/app/build/outputs/apk/release/app-release.apk
        if-no-files-found: warn

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenFind-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
